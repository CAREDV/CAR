<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CAR Anfrage</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f5f5f5;
}

h1{
margin-bottom:40px;
}

button{
font-size:22px;
padding:18px 40px;
margin:15px;
border:none;
background:#0077cc;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

#form{
display:none;
margin-top:30px;
}

input{
font-size:18px;
padding:12px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}
</style>

</head>

<body>

<h1>Bitte Auswahl treffen</h1>

<button onclick="selectOption('Abisco')">Abisco</button>
<button onclick="selectOption('PartX')">PartX</button>

<div id="form">

<h2 id="selected"></h2>

<input type="email" id="email" placeholder="Ihre Mailadresse">

<br><br>

<button onclick="send()">Senden</button>

</div>

<script>

let option="";

function selectOption(o){
option=o;
document.getElementById("form").style.display="block";
document.getElementById("selected").innerText="Auswahl: "+o;
}

function send(){

let email=document.getElementById("email").value;

fetch("https://formsubmit.co/ajax/edv@car-gmbh.de",{
method:"POST",
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
Auswahl: option,
Email: email
})
})
.then(response => alert("Vielen Dank! Anfrage wurde gesendet."));

}

</script>

</body>
</html>
